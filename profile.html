<!DOCTYPE html>
<html>
<head>
  <title>Simple Profile</title>
  <style>
    body{
      background:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .card{
      background:blue;
      color:white;
      padding:20px;
      width:250px;
      text-align:center;
      border-radius:20px;
    }
    img{
      width:120px;
      border: black;
      border-radius:50%;
        }
    button{
      margin-top:15px;
      padding:10px 20px;
      border:black;
      background:white;
      color:blue;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://png.pngtree.com/png-clipart/20231019/original/pngtree-user-profile-avatar-png-image_13369988.png" alt="Akhil">
    
    <h2>Akhil</h2>
    
    <p>Currently in 3rd year in Parul University</p>
    
    <button>Follow</button>
  </div>

</body>
</html>
